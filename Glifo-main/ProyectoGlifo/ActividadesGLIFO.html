        function showToast(mensaje, esError = false) {
            const existingToast = document.querySelector('.toast-message');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            if (esError) toast.classList.add('error');
            toast.textContent = mensaje;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function normalize(text) {
            return text.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^\w\s]/g, '')
                .trim();
        }

        function generateRandomKeywords(count = 4) {
            const shuffled = [...WORD_BANK];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count).map(w => w.charAt(0).toUpperCase() + w.slice(1));
        }

        let dragCompletados = 0;

        function actualizarProgresoDrag() {
            const porcentaje = (dragCompletados / librosAutoresData.length) * 100;
            const barra = document.getElementById('dragProgressFill');
            const texto = document.getElementById('dragProgressText');
            const contador = document.getElementById('dragMatchedCount');
            if (barra) barra.style.width = `${porcentaje}%`;
            if (texto) texto.textContent = `${dragCompletados} de ${librosAutoresData.length} libros emparejados`;
            if (contador) contador.textContent = dragCompletados;
        }
        
        function initDragEvents() {
            const books = document.querySelectorAll('.drag-book-item');
            const zones = document.querySelectorAll('.drop-author-zone');
            books.forEach(book => {
                book.setAttribute('draggable', 'true');
                book.addEventListener('dragstart', (e) => { draggedBook = book; book.classList.add('dragging'); e.dataTransfer.setData('text/plain', book.getAttribute('data-libro')); });
                book.addEventListener('dragend', () => { book.classList.remove('dragging'); draggedBook = null; });
            });
            zones.forEach(zone => {
                zone.addEventListener('dragover', (e) => { e.preventDefault(); if (zone.getAttribute('data-matched') !== 'true') zone.classList.add('drag-over'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', (e) => {
                    e.preventDefault(); zone.classList.remove('drag-over');
                    if (zone.getAttribute('data-matched') === 'true') { showToast("Este autor ya tiene un libro asignado", true); return; }
                    if (!draggedBook) return;
                    const libroNombre = draggedBook.getAttribute('data-libro');
                    const autorCorrecto = draggedBook.getAttribute('data-autor');
                    const autorZona = zone.getAttribute('data-autor');
                    if (autorCorrecto === autorZona) {
                        const libroIcono = draggedBook.querySelector('.item-icon')?.innerHTML || '📖';
                        const autorIcono = zone.getAttribute('data-autor-icon') || '👨';
                        zone.innerHTML = `<div style="display:flex; align-items:center; gap:0.75rem;"><div class="item-icon">${libroIcono}</div><div class="item-title" style="font-weight:600;">${libroNombre}</div><div>→</div><div class="item-icon">${autorIcono}</div><div class="item-title">${autorZona}</div></div>`;
                        zone.setAttribute('data-matched', 'true'); zone.classList.add('filled');
                        draggedBook.remove(); dragCompletados++; actualizarProgresoDrag();
                        showToast(`Correcto! "${libroNombre}" fue escrito por ${autorZona}`);
                        if (dragCompletados === librosAutoresData.length) setTimeout(() => showToast("Felicidades! Has emparejado todos los libros!"), 500);
                    } else { showToast(`Incorrecto. "${libroNombre}" no fue escrito por ${autorZona}`, true); }
                });
            });
        }

            const pregunta = juegoPreguntasData[juegoIndex];
            const html = `

                <div class="game-wrapper"><div class="game-progress-bar">Pregunta ${juegoIndex+1} de ${juegoPreguntasData.length}</div><div class="game-score-display">Puntuación: ${juegoPuntaje}</div>
                <div class="question-card"><div class="riddle-text">${pregunta.texto}</div><div class="options-grid" id="opcionesJuego">${pregunta.opciones.map(op => `<button class="game-option" data-opcion="${op}">${op}</button>`).join('')}</div>
                <div class="feedback-message" id="feedbackJuego"></div><button class="btn-next-question" id="siguientePregunta" style="display:none;">Siguiente pregunta</button></div></div>
            `;
            activityContent.innerHTML = html;
            const opciones = document.querySelectorAll('.game-option');
            opciones.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (juegoRespondido) return;
                    const seleccion = btn.getAttribute('data-opcion');
                    const feedback = document.getElementById('feedbackJuego');
                    if (seleccion === pregunta.correcta) { juegoPuntaje++; feedback.innerHTML = `<p>Correcto! La respuesta es "${pregunta.correcta}"</p>`; feedback.className = 'feedback-message show correct'; showToast("Respuesta correcta!"); }

                    juegoRespondido = true;

                    document.getElementById('siguientePregunta').style.display = 'block';

            document.getElementById('siguientePregunta')?.addEventListener('click', () => { juegoIndex++; juegoRespondido = false; cargarPreguntaJuego(); });

        function loadEscritura() {
            let palabrasActuales = generateRandomKeywords(4);
            
            const html = `
                <div class="poetry-hero">
                    <h1>Escritura Creativa con Palabras Clave</h1>
                    <p>Usa las palabras sugeridas para crear un poema original</p>
                </div>
                <div class="poetry-writing-section">
                    <div class="poetry-writing-card">

                            <div class="keywords-label"><span class="label-icon">🎯</span><span>Palabras clave del desafío</span></div>
                            <div class="keywords-display">
                                <input id="keywordsPoem" class="keywords-input" value="${palabrasActuales.join(', ')}" readonly />
                                <button id="refreshKeywordsPoem" class="icon-btn">🔄</button>
                            </div>
                        </div>
                        <div class="poem-area">
                            <div class="poem-label"><span class="label-icon">📝</span><span>Tu poema creativo</span></div>
                            <textarea id="poemText" class="poem-textarea" placeholder="Escribe tu poema aquí...&#10;&#10;Consejos creativos:&#10;• Usa las 4 palabras clave de forma natural&#10;• Crea versos con saltos de línea&#10;• Experimenta con metáforas y emociones" rows="12"></textarea>
                        </div>
                        <div class="action-buttons"><button id="evaluatePoem" class="btn-evaluate">📊 Evaluar mi poema</button></div>
                        <div id="resultPoem" class="result-container"></div>
                    </div>
                </div>
            `;
            
            activityContent.innerHTML = html;
            
            document.getElementById('refreshKeywordsPoem').addEventListener('click', () => {
                palabrasActuales = generateRandomKeywords(4);
                document.getElementById('keywordsPoem').value = palabrasActuales.join(', ');
                document.getElementById('poemText').value = '';
                document.getElementById('resultPoem').innerHTML = '';
                showToast("Nuevas palabras clave generadas");
            });
            
            document.getElementById('evaluatePoem').addEventListener('click', () => {
                const poema = document.getElementById('poemText').value;
                const keywordsStr = document.getElementById('keywordsPoem').value;
                const keywords = keywordsStr.split(',').map(k => normalize(k.trim()));
                const poemaNorm = normalize(poema);
                
                if (!poema.trim()) { showToast("Escribe un poema primero", true); return; }
                
                let palabrasUsadas = [];
                let aciertos = 0;
                keywords.forEach(k => {
                    if (poemaNorm.includes(k)) { palabrasUsadas.push(k); aciertos++; }
                });
                
                const lineas = poema.split('\n').filter(l => l.trim().length > 0).length;
                const longitud = poema.split(/\s+/).filter(w => w.length > 0).length;
                
                let puntuacion = 0;
                let mensaje = "";
                let consejos = [];
                
                if (longitud >= 30) { puntuacion += 3; mensaje += "Buena extensión. "; }
                else if (longitud >= 15) { puntuacion += 2; mensaje += "Longitud adecuada. "; }
                else { consejos.push("Intenta escribir al menos 15 palabras."); }
                
                if (aciertos >= 3) { puntuacion += 3; mensaje += `Excelente uso de palabras clave (${aciertos}/4). `; }
                else if (aciertos >= 2) { puntuacion += 2; mensaje += `Bien! Usaste ${aciertos} de 4 palabras clave. `; }
                else { consejos.push("Incorpora más palabras clave en tu poema."); }
                
                if (lineas >= 3) { puntuacion += 2; mensaje += "Buena estructura de versos. "; }
                else { consejos.push("Añade saltos de línea para crear versos."); }
                
                const emociones = ['amor', 'triste', 'feliz', 'dolor', 'miedo', 'paz', 'calma', 'soledad'];
                const emocionesEncontradas = emociones.filter(e => poemaNorm.includes(e));
                if (emocionesEncontradas.length >= 2) { puntuacion += 2; mensaje += "Gran carga emocional. "; }
                else if (emocionesEncontradas.length >= 1) { puntuacion += 1; mensaje += "Contiene elementos emocionales. "; }
                else { consejos.push("Añade más emoción a tu poema."); }
                
                const esBueno = puntuacion >= 7;
                
                document.getElementById('resultPoem').innerHTML = `
                    <div class="${esBueno ? 'good' : 'bad'}">
                        <strong>${esBueno ? '¡Buen trabajo!' : 'Necesita mejoras'}</strong>
                        <div style="margin-top:8px; font-size:14px;">Puntuación: ${puntuacion}/10 puntos</div>
                        <div style="margin-top:8px;">📊 ${mensaje}</div>
                        ${consejos.length > 0 ? `<div style="margin-top:8px;"><strong>💡 Consejos:</strong><ul>${consejos.map(c => `<li>${c}</li>`).join('')}</ul></div>` : ''}
                        <div style="margin-top:8px;"><small>Palabras clave detectadas: ${palabrasUsadas.length ? palabrasUsadas.join(', ') : 'ninguna'}</small></div>
                    </div>
                `;
            });
        }

            `).join('');
            
            const html = `
                <div class="activity-header">
                    <h1>Recursos Multimedia GLIFO</h1>
                    <p>Videos educativos para fortalecer la comprensión lectora</p>
                </div>
                <div class="multimedia-container">
                    <div class="video-grid">
                        ${videosHtml}
                    </div>
                </div>
            `;
            
            activityContent.innerHTML = html;
        }

        // ==========================================
        // TRANSICIÓN ENTRE ACTIVIDADES
        // ==========================================
        function transitionToActivity(activityId) {
            const contentDiv = document.getElementById('activityContent');
            contentDiv.classList.add('fade-out');
            setTimeout(() => {
                if (activityId === 'cuestionario') loadCuestionario();
                else if (activityId === 'dragdrop') loadDragDrop();
                else if (activityId === 'juego') loadJuego();
                else if (activityId === 'evaluacion') loadEvaluacion();
                else if (activityId === 'escritura') loadEscritura();
                else if (activityId === 'multimedia') loadMultimedia();
                contentDiv.classList.remove('fade-out');
                contentDiv.classList.add('fade-in');
                setTimeout(() => contentDiv.classList.remove('fade-in'), 500);
            }, 300);
            document.querySelectorAll('.activity-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-activity') === activityId) btn.classList.add('active');
            });
        }

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.querySelectorAll('.activity-btn').forEach(btn => {
            btn.addEventListener('click', () => transitionToActivity(btn.getAttribute('data-activity')));
        });
        
        loadDragDrop();
        document.querySelector('.activity-btn[data-activity="dragdrop"]').classList.add('active');
    </script>
</body>
</html>
